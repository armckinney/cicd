name: wf-terraform-destroy

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Name of the configuration'
        required: true
        type: choice
        options:
        - example
      environment:
        description: 'Configuration Environment, should be the same for both the backend and GitHub environment'
        required: true
        type: choice
        options:
        - dev
        - test
        - prod

defaults:
  run:
    shell: bash

jobs:
  container-build-and-push:
    uses: ./.github/workflows/rwf-container-build-and-push.yaml

  static-analysis:
    needs: [container-build-and-push]
    uses: ./.github/workflows/rwf-terraform-static-analysis.yaml
    with:
      container_image: ${{ needs.container-build-and-push.outputs.container_image }}
      configuration: ${{ inputs.configuration }}
      environment: ${{ inputs.environment }}

  terraform-show:
    needs: [container-build-and-push, static-analysis]
    uses: ./.github/workflows/rwf-terraform-show.yaml
    with:
      container_image: ${{ needs.container-build-and-push.outputs.container_image }}
      configuration: ${{ inputs.configuration }}
      environment: ${{ inputs.environment }}

  terraform-destroy:
    needs: [container-build-and-push, terraform-show]
    uses: ./.github/workflows/rwf-terraform-destroy.yaml
    with:
      container_image: ${{ needs.container-build-and-push.outputs.container_image }}
      configuration: ${{ inputs.configuration }}
      environment: ${{ inputs.environment }}
