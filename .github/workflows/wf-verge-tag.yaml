name: wf-tag-semver

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]

jobs:
  tag-semver:
    uses: ./.github/workflows/rwf-verge-tag.yaml
    secrets: inherit
    with:
      verge_arguments: ${{ github.ref_name == github.event.repository.default_branch && '--kind final' || '' }}
      prune_dev_tags: ${{ github.ref_name == github.event.repository.default_branch }}
