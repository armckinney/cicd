name: container-build-and-push

on:
  workflow_call:
    inputs:
      dockerhub_id: 
        description: "Deprecated: DockerHub username (no longer used, kept for backwards compatibility)"
        type: string
        required: false
      dockerfile:
        description: "Filepath of dockerfile to build and push"
        type: string
        required: false
        default: "./.devcontainer/Dockerfile"
      image_name: 
        description: "Name of the Docker image to build and push"
        type: string
        required: false
        default: ${{ github.event.repository.name }}
      image_tag:
        description: "Tag to use for the Docker image"
        type: string
        required: false
        default: ${{ github.head_ref || github.ref_name }}
    secrets:
      DOCKER_HUB_ACCESS_TOKEN:
        description: "Deprecated: DockerHub access token (no longer used, kept for backwards compatibility)"
        required: false
    outputs:
      container_image:
        description: "Docker image name"
        value: ${{ jobs.container-build-and-push.outputs.container_image }}

defaults:
  run:
    shell: bash

jobs:
  container-build-and-push:
    runs-on: ubuntu-24.04
    outputs:
        container_image: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.image_tag }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Access Docker layer cache
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3

    - name: Build from cache and push
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: ./
        file: ${{ inputs.dockerfile }}
        builder: ${{ steps.buildx.outputs.name }}
        tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new
        push: true

    - name: Clean cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
