name: container-build-and-push

on:
  workflow_call:
    inputs:
      dockerfile:
        description: "Filepath of dockerfile to build and push"
        type: string
        required: false
        default: "./.devcontainer/Dockerfile"
      image_name: 
        description: "Name of the Docker image to build and push"
        type: string
        required: false
        default: ${{ github.event.repository.name }}
      image_tag:
        description: "Tag to use for the Docker image; default is dockerfile content hash"
        type: string
        required: false
        default: ""
      platforms:
        description: "Comma-separated list of platforms to build for (e.g., 'linux/amd64,linux/arm64')"
        type: string
        required: false
        default: "linux/amd64"
    outputs:
      container_image:
        description: "Docker image name"
        value: ${{ jobs.container-build-and-push.outputs.container_image }}

defaults:
  run:
    shell: bash

jobs:
  container-build-and-push:
    runs-on: ubuntu-24.04
    outputs:
        container_image: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ steps.resolve_image_tag.outputs.image_tag }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Access Docker layer cache
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3

    - name: Resolve image tag
      id: resolve_image_tag
      run: |
        if [[ -n "${{ inputs.image_tag }}" ]]; then
          echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
        else
          image_tag="$(sha256sum "${{ inputs.dockerfile }}" | cut -c1-12)"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
        fi

    - name: Build from cache and push
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        builder: ${{ steps.buildx.outputs.name }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new
        context: ./
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ steps.resolve_image_tag.outputs.image_tag }}

    - name: Clean cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
