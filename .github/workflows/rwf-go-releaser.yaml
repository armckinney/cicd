name: go-releaser

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Directory containing GoReleaser configuration'
        type: string
        required: false
        default: '.'
      go_version:
        description: 'Go version to install'
        type: string
        required: false
        default: ''
      goreleaser_version:
        description: 'GoReleaser version to use'
        type: string
        required: false
        default: 'latest'
      args:
        description: 'Arguments to pass to GoReleaser'
        type: string
        required: false
        default: 'release --clean'
    secrets:
      token:
        description: 'GitHub token with contents write permissions. Defaults to github.token if not provided.'
        required: false

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Checkout CICD library
      uses: armckinney/cicd/.github/actions/github/checkout-cicd-library@main

    - name: Set up Go
      uses: ./.github/cicd/.github/actions/go/setup
      with:
        go-version: ${{ inputs.go_version }}
        working-directory: ${{ inputs.working_directory }}

    - name: Run GoReleaser
      uses: ./.github/cicd/.github/actions/go/releaser
      with:
        version: ${{ inputs.goreleaser_version }}
        args: ${{ inputs.args }}
        github-token: ${{ secrets.token || github.token }}