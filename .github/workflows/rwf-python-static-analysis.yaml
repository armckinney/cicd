name: python-static-analysis

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Directory to run static analysis in'
        type: string
        required: false
        default: '.'
      python_version:
        description: 'Python version to use'
        type: string
        required: false
        default: '3.12'

defaults:
  run:
    shell: bash

jobs:
  ruff-check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Ruff check
      working-directory: ${{ inputs.working_directory }}
      run: |
        uv run ruff check .

  ruff-format:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Ruff format check
      working-directory: ${{ inputs.working_directory }}
      run: |
        uv run ruff format --check .

  ty-check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Ty check
      working-directory: ${{ inputs.working_directory }}
      run: |
        uv run ty check .
