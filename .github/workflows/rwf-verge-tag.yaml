name: tag-semver

on:
  workflow_call:
    inputs:
      verge_arguments:
        description: 'Raw arguments passed directly to the Verge CLI bump command (e.g. "--kind final")'
        type: string
        required: false
        default: ''
      prune_dev_tags:
        description: 'Whether to prune old dev tags upon successful final release promotion'
        type: boolean
        required: false
        default: true
    secrets:
      token:
        description: 'GitHub token with contents write permissions. Defaults to github.token if not provided.'
        required: false
    outputs:
      version:
        description: 'Published version, e.g. "1.2.4" or "v1.2.4"'
        value: ${{ jobs.tag-semver.outputs.version }}

defaults:
  run:
    shell: bash

jobs:
  tag-semver:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: read
    outputs:
      version: ${{ steps.verge_bump.outputs.tag }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.token || github.token }}

    - name: Get PR Info for Bump Kind
      id: pr_info
      uses: ./.github/actions/github/get-pull-request
      with:
        token: ${{ secrets.token || github.token }}

    - name: Set up Verge CLI
      uses: ./.github/actions/verge/setup

    - name: Resolve Verge Arguments
      id: resolve_args
      shell: bash
      run: |
        ARGS="${{ inputs.verge_arguments }}"
        
        # 1. Resolve the dev tag prefix that was used on the feature branch.
        # Feature branches default to patch prereleases (e.g. vX.Y.Z-dev.N) on top of the last stable release.
        # We run verge bump with '--provider gittag' (to ignore prereleases) and '--kind prerelease'
        # to find the exact dev prefix that would have been generated on the feature branch.
        DEV_TAG=$(verge bump --provider gittag --kind prerelease)
        DEV_PREFIX=$(verge parse "$DEV_TAG" --field floating.prerelease --format text)
        echo "Calculated feature branch dev prefix to prune: $DEV_PREFIX"
        echo "prune_prefix=$DEV_PREFIX" >> $GITHUB_OUTPUT

        # 2. Dynamically resolve the final release bump kind on the default branch
        if [[ "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" ]]; then
          if [[ ! "$ARGS" =~ "--kind" ]]; then
            BUMP_KIND="${{ steps.pr_info.outputs.bump_type }}"
            ARGS="$ARGS --kind $BUMP_KIND"
          fi
        fi
        
        echo "args=$ARGS" >> $GITHUB_OUTPUT

    - name: Verge bump
      id: verge_bump
      uses: ./.github/actions/verge/bump
      with:
        verge_arguments: ${{ steps.resolve_args.outputs.args }}

    - name: Push tags
      uses: ./.github/actions/verge/push-tags
      with:
        version: ${{ steps.verge_bump.outputs.tag }}

    - name: Prune Old Dev Tags on Final Release
      if: success() && inputs.prune_dev_tags == true && steps.verge_bump.outputs.is_prerelease == 'false'
      uses: ./.github/actions/github/prune-tags
      with:
        prerelease_prefix: ${{ steps.resolve_args.outputs.prune_prefix }}
        token: ${{ secrets.token || github.token }}
