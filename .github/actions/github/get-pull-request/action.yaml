name: get-pull-request
description: >
  Returns the PR number and bump label (major|minor|patch) for the current branch
  or a specific commit SHA. Defaults to patch if no PR or bump label is found.

outputs:
  pr_number:
    description: 'PR number (empty string if no PR found)'
    value: ${{ steps.get_pr.outputs.pr_number }}
  bump_type:
    description: 'Bump type derived from PR label: major | minor | patch (default: patch)'
    value: ${{ steps.get_pr.outputs.bump_type }}
  json:
    description: 'Full PR JSON object (compact, single line). Empty string if no PR found.'
    value: ${{ steps.get_pr.outputs.json }}

runs:
  using: composite
  steps:
  - name: Get pull request
    id: get_pr
    shell: bash
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      REPO_OWNER: ${{ github.repository_owner }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    run: ${{ github.action_path }}/get-pull-request.sh
